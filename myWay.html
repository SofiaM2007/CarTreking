<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myWay</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        .map {
            height: 60%;
            background: lightblue;
        }

        #divider {
            height: 10px;
            background: gray;
            cursor: row-resize;
            touch-action: none;
        }

        .driveInfo {
            height: calc(40% - 10px);
            background: whitesmoke;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body style="margin: 0; padding: 0;">
    <div class="map">
        <div id="map"></div>
    </div>

    <div id="divider"></div>

    <div class="driveInfo">
        <h1>!!!</h1>
    </div>

</body>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const divider = document.getElementById("divider");
    const map = document.querySelector(".map");
    const info = document.querySelector(".driveInfo");

    let dragging = false;

    divider.addEventListener("pointerdown", () => {
        dragging = true;
    });

    window.addEventListener("pointerup", () => {
        dragging = false;
    });

    window.addEventListener("pointermove", (e) => {

        if (!dragging) return;

        let y = e.clientY;
        if (y< window.innerHeight * 0.3) y = window.innerHeight * 0.3;
        if (y> window.innerHeight * 0.7) y = window.innerHeight * 0.7;

        map.style.height = y + "px";
        

        info.style.height =
            (window.innerHeight - y - divider.offsetHeight) + "px";

    });


    navigator.geolocation.watchPosition(
        (position) => {

            console.log(position.coords.latitude);
            console.log(position.coords.longitude);

        },
        (error) => {
            console.log(error);
        },
        {
            enableHighAccuracy: true
        }
    );
    const mapmy = L.map("map").setView([50.088, 14.42], 15);

    L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            maxZoom: 19
        }
    ).addTo(mapmy);
    navigator.geolocation.watchPosition((pos) => {

        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        mapmy.setView([lat, lon]);

    });
    let marker = L.marker([0, 0]).addTo(mapmy);

    navigator.geolocation.watchPosition((pos) => {

        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        marker.setLatLng([lat, lon]);

    });


</script>


</html>
